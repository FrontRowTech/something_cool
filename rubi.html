<head>
<meta charset="UTF-8">

<title>Front Row Tech — Rubik's Cube Hero</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap');
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:100%; height:100%; background:#000; color:#f5f0e8; font-family:'Space Mono',monospace; overflow:hidden; }
  #hero { position:relative; width:100vw; height:100vh; display:flex; align-items:center; justify-content:center; overflow:hidden; }
  /* Subtle dark radial glow — not brown, just very dark warm grey */
  #hero::before {
    content:''; position:absolute; inset:0; pointer-events:none;
    background: radial-gradient(ellipse 70% 60% at 62% 50%, #141414 0%, #080808 50%, #000 100%);
  }
  /* Fine dot grid */
  #hero::after {
    content:''; position:absolute; inset:0; pointer-events:none; z-index:0;
    background-image: radial-gradient(circle, rgba(255,255,255,0.06) 1px, transparent 1px);
    background-size: 38px 38px;
  }
  #canvas-container { position:absolute; inset:0; z-index:1; cursor:grab; }
  #canvas-container:active { cursor:grabbing; }
  .hero-content {
    position:relative; z-index:3; pointer-events:none;
    max-width:980px; width:100%; padding:0 52px;
    display:grid; grid-template-columns:1fr 1fr; align-items:center;
  }
  .hero-left { padding-right:52px; }
  .tag { font-size:10px; letter-spacing:.35em; text-transform:uppercase; color:#e03020; opacity:.85; margin-bottom:16px; }
  h1 { font-family:'Bebas Neue',sans-serif; font-size:clamp(58px,7vw,98px); line-height:.9; letter-spacing:.02em; color:#f5f0e8; margin-bottom:20px; }
  h1 span { color:#e03020; }
 
  .subtitle { font-size:12px; line-height:1.9; color:rgba(245,240,232,.38); max-width:260px; margin-bottom:34px; }
  .subtitle span { color:#e03020; }
  .cta-row { display:flex; gap:14px; pointer-events:all; }
  .btn-primary { background:#e03020; color:#000; border:none; padding:13px 28px; font-family:'Space Mono',monospace; font-size:11px; font-weight:700; letter-spacing:.15em; text-transform:uppercase; cursor:pointer; transition:all .2s; }
  .btn-primary:hover { background:#ff4433; transform:translateY(-2px); }
  .btn-ghost { background:transparent; color:#f5f0e8; border:1px solid rgba(245,240,232,.18); padding:12px 24px; font-family:'Space Mono',monospace; font-size:11px; letter-spacing:.15em; text-transform:uppercase; cursor:pointer; transition:all .2s; }
  .btn-ghost:hover { border-color:#e03020; color:#e03020; }
  .hint { position:absolute; bottom:34px; left:50%; transform:translateX(-50%); z-index:4; font-size:10px; letter-spacing:.3em; color:rgba(245,240,232,.2); text-transform:uppercase; animation:pulse 3s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:.15} 50%{opacity:.55} }
  .hero-content { animation:fadeUp 1s ease both .4s; opacity:0; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(22px)} to{opacity:1;transform:translateY(0)} }
  /* State label */
  #state-label { position:absolute; top:32px; right:40px; z-index:4; font-size:10px; letter-spacing:.3em; text-transform:uppercase; color:rgba(224,48,32,.5); animation:pulse 2s ease-in-out infinite; }
</style>
</head>

// ══════════════════════════════════════════════════════════════
const container = document.getElementById('canvas-container');
const stateLabel = document.getElementById('state-label');
let W = window.innerWidth, H = window.innerHeight;

const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(W, H);
container.appendChild(renderer.domElement);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(40, W/H, 0.1, 100);
camera.position.set(0, 0, 11);

// ══════════════════════════════════════════════════════════════
// LIGHTING — bright, high-contrast for shiny black
// ══════════════════════════════════════════════════════════════
scene.add(new THREE.AmbientLight(0xffffff, 0.45));
const k = new THREE.DirectionalLight(0xffffff, 2.8); k.position.set(7,10,8); scene.add(k);
const f = new THREE.DirectionalLight(0xaaccff, 0.9); f.position.set(-8,-3,5); scene.add(f);
const r = new THREE.DirectionalLight(0xffddaa, 1.1); r.position.set(1,-7,-5); scene.add(r);
const t = new THREE.DirectionalLight(0xffffff, 0.5); t.position.set(0,8,0); scene.add(t);

// ══════════════════════════════════════════════════════════════
// BUILD LOGO TEXTURE  — renders logo centred on black square
// ══════════════════════════════════════════════════════════════
function buildLogoTexture(cb){
  const sz = 512;
  const cv = document.createElement('canvas'); cv.width=sz; cv.height=sz;
  const ctx = cv.getContext('2d');
  // black background
  ctx.fillStyle='#000'; ctx.fillRect(0,0,sz,sz);
  const img = new Image();
  img.onload = () => {
    // draw logo centred, scaled to 72% of face
    const pad = sz*0.14;
    ctx.drawImage(img, pad, pad, sz-pad*2, sz-pad*2);
    const tex = new THREE.CanvasTexture(cv);
    cb(tex);
  };
  img.src = LOGO_B64;
}

// ══════════════════════════════════════════════════════════════
// BUILD CUBIE TEXTURES  — each face gets a 3×3 tile of the
// logo grid so when all 9 cubies of one face are aligned the
// full logo appears.
// tile(row,col) = which cell of the 3×3 logo grid this cubie shows
// ══════════════════════════════════════════════════════════════
function buildFaceTileTexture(logoImg, row, col, cb){
  const sz = 256; // output tile
  const src = 512; // logo canvas size
  const cell = src / 3;
  const cv = document.createElement('canvas'); cv.width=sz; cv.height=sz;
  const ctx = cv.getContext('2d');
  ctx.fillStyle='#000'; ctx.fillRect(0,0,sz,sz);
  // draw the correct 1/9 slice of the logo, scaled up to full tile
  ctx.drawImage(logoImg, col*cell, row*cell, cell, cell, 0, 0, sz, sz);
  // subtle bevel border
  ctx.strokeStyle='rgba(255,255,255,0.06)';
  ctx.lineWidth=6;
  ctx.strokeRect(3,3,sz-6,sz-6);
  const tex = new THREE.CanvasTexture(cv);
  cb(tex);
}

// ══════════════════════════════════════════════════════════════
// CUBE
// ══════════════════════════════════════════════════════════════
const cubeGroup = new THREE.Group();
scene.add(cubeGroup);

const S = 1.05;   // spacing
const CS = 0.96;  // cubie size

// Dark shiny black body material
const bodyMat = new THREE.MeshStandardMaterial({
  color: 0x111111, roughness: 0.18, metalness: 0.85,
  envMapIntensity: 1.2
});
const bodyMatAlt = new THREE.MeshStandardMaterial({
  color: 0x0a0a0a, roughness: 0.05, metalness: 0.95
});

// We'll store cubies and build them once logo loads
const cubies = [];

function buildCube(logoImg){
  // Pre-build all 9 tile textures × 6 faces
  // Face index mapping (Three.js BoxGeometry):
  // 0=+x, 1=-x, 2=+y, 3=-y, 4=+z, 5=-z
  // For each outer face we map a 3×3 tile based on neighbour coords
  // +x face: when lx===1, tile row=1-ly (flipped), col=1+lz
  // -x face: when lx===-1, tile row=1-ly, col=1-lz
  // +y face: when ly===1, tile row=1+lz, col=1+lx
  // -y face: when ly===-1, tile row=1-lz, col=1+lx
  // +z face: when lz===1, tile row=1-ly, col=1+lx
  // -z face: when lz===-1, tile row=1-ly, col=1-lx

  // Generate all tile textures (3*3=9 unique cells)
  const tileCache = {};
  let pending = 0;
  const tileKeys = [];
  for(let r=0;r<3;r++) for(let c=0;c<3;c++) tileKeys.push(`${r},${c}`);

  function onAllTiles(){
    // Now build cubies
    for(let lx=-1;lx<=1;lx++){
      for(let ly=-1;ly<=1;ly++){
        for(let lz=-1;lz<=1;lz++){
          const body = ((lx+ly+lz)%2===0) ? bodyMat : bodyMatAlt;

          function tileMat(r,c){
            const tex = tileCache[`${r},${c}`];
            return new THREE.MeshStandardMaterial({
              map: tex, roughness:0.25, metalness:0.55,
              envMapIntensity:0.8
            });
          }

          const mats = [
            lx=== 1 ? tileMat(Math.max(0,Math.min(2,1-ly)), Math.max(0,Math.min(2,1+lz))) : body,
            lx===-1 ? tileMat(Math.max(0,Math.min(2,1-ly)), Math.max(0,Math.min(2,1-lz))) : body,
            ly=== 1 ? tileMat(Math.max(0,Math.min(2,1+lz)), Math.max(0,Math.min(2,1+lx))) : body,
            ly===-1 ? tileMat(Math.max(0,Math.min(2,1-lz)), Math.max(0,Math.min(2,1+lx))) : body,
            lz=== 1 ? tileMat(Math.max(0,Math.min(2,1-ly)), Math.max(0,Math.min(2,1+lx))) : body,
            lz===-1 ? tileMat(Math.max(0,Math.min(2,1-ly)), Math.max(0,Math.min(2,1-lx))) : body,
          ];

          // Rounded-edge cubie: use a SphereGeometry baked into a cube shape
          // via a BoxGeometry with beveled appearance by using multiple segments
          // Three.js r128 doesn't have RoundedBoxGeometry natively,
          // so we fake rounded edges with a merged approach:
          // outer box slightly inset + an edge-chamfer trick using scale
          const geo = new THREE.BoxGeometry(CS, CS, CS, 1, 1, 1);
          // Shift vertices slightly inward to fake chamfer rounding
          const pos = geo.attributes.position;
          const BEVEL = 0.045;
          for(let i=0;i<pos.count;i++){
            let x=pos.getX(i), y=pos.getY(i), z=pos.getZ(i);
            const half = CS/2;
            const onX = Math.abs(Math.abs(x)-half) < 0.001;
            const onY = Math.abs(Math.abs(y)-half) < 0.001;
            const onZ = Math.abs(Math.abs(z)-half) < 0.001;
            const edgeCount = (onX?1:0)+(onY?1:0)+(onZ?1:0);
            if(edgeCount>=2){
              // pull vertex slightly inward along each axis it's on the face of
              if(onX) x -= Math.sign(x)*BEVEL*(edgeCount===3?0.6:1);
              if(onY) y -= Math.sign(y)*BEVEL*(edgeCount===3?0.6:1);
              if(onZ) z -= Math.sign(z)*BEVEL*(edgeCount===3?0.6:1);
              pos.setXYZ(i,x,y,z);
            }
          }
          geo.computeVertexNormals();

          const mesh = new THREE.Mesh(geo, mats);
          mesh.position.set(lx*S, ly*S, lz*S);
          cubeGroup.add(mesh);
          cubies.push({ mesh, lx, ly, lz });
        }
      }
    }
    startLoop();
  }

  tileKeys.forEach(key => {
    const [r,c] = key.split(',').map(Number);
    pending++;
    buildFaceTileTexture(logoImg, r, c, tex => {
      tileCache[key] = tex;
      pending--;
      if(pending===0) onAllTiles();
    });
  });
}

// Load logo image first, then build cube
const logoImg = new Image();
logoImg.onload = () => buildCube(logoImg);
logoImg.src = LOGO_B64;

// ══════════════════════════════════════════════════════════════
// SLICE ROTATION — same proven local-pivot approach
// ══════════════════════════════════════════════════════════════
const MOVE_DEFS = [
  { axis:'lx', vec:new THREE.Vector3(1,0,0) },
  { axis:'ly', vec:new THREE.Vector3(0,1,0) },
  { axis:'lz', vec:new THREE.Vector3(0,0,1) },
];
let sliceAnim = null;
let sliceDelay = 0.8;

// ── Solve/Scramble state machine ─────────────────────────────
// States: 'solved' → wait → 'scrambling' → wait → 'solving' → 'solved'
let cubeState = 'solved';    // solved | scrambling | solving
let stateTimer = 2.5;        // seconds in current state
const SCRAMBLE_MOVES = 18;
const SOLVE_MOVES    = 18;
let movesLeft = 0;
let moveHistory = [];        // record scramble moves so we can reverse them

function pickMove(){
  const def   = MOVE_DEFS[Math.floor(Math.random()*3)];
  const layer = [-1,0,1][Math.floor(Math.random()*3)];
  const dir   = Math.random()<0.5?1:-1;
  return { def, layer, dir };
}

function startSlice(def, layer, dir){
  if(sliceAnim) return false;
  const targets = cubies.filter(c => c[def.axis]===layer);
  const pivot = new THREE.Group();
  cubeGroup.add(pivot);
  targets.forEach(c => {
    const p=c.mesh.position.clone(), q=c.mesh.quaternion.clone();
    cubeGroup.remove(c.mesh); pivot.add(c.mesh);
    c.mesh.position.copy(p); c.mesh.quaternion.copy(q);
  });
  sliceAnim = {
    pivot, targets, def,
    elapsed:0, duration:0.38,
    totalAngle:(Math.PI/2)*dir,
    rotated:0,
  };
  return true;
}

const _wP=new THREE.Vector3(), _wQ=new THREE.Quaternion(), _iM=new THREE.Matrix4();
function snapQ(q){
  const e=new THREE.Euler().setFromQuaternion(q,'XYZ');
  const r=Math.PI/2;
  e.x=Math.round(e.x/r)*r; e.y=Math.round(e.y/r)*r; e.z=Math.round(e.z/r)*r;
  return new THREE.Quaternion().setFromEuler(e);
}
function finaliseSlice(){
  const s=sliceAnim;
  cubeGroup.updateMatrixWorld(true);
  _iM.copy(cubeGroup.matrixWorld).invert();
  s.targets.forEach(c=>{
    c.mesh.getWorldPosition(_wP); c.mesh.getWorldQuaternion(_wQ);
    s.pivot.remove(c.mesh); cubeGroup.add(c.mesh);
    const lp=_wP.clone().applyMatrix4(_iM);
    c.mesh.position.set(
      Math.round(lp.x/S)*S, Math.round(lp.y/S)*S, Math.round(lp.z/S)*S
    );
    const pWQ=new THREE.Quaternion(); cubeGroup.getWorldQuaternion(pWQ);
    c.mesh.quaternion.copy(snapQ(pWQ.clone().invert().multiply(_wQ)));
    c.lx=Math.round(c.mesh.position.x/S);
    c.ly=Math.round(c.mesh.position.y/S);
    c.lz=Math.round(c.mesh.position.z/S);
  });
  cubeGroup.remove(s.pivot);
  sliceAnim=null;
}

function updateSlice(dt){
  if(!sliceAnim) return;
  const s=sliceAnim;
  s.elapsed+=dt;
  const t=Math.min(s.elapsed/s.duration,1);
  const et=t<0.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2;
  const angle=s.totalAngle*et;
  const delta=angle-s.rotated; s.rotated=angle;
  const dq=new THREE.Quaternion().setFromAxisAngle(s.def.vec,delta);
  s.pivot.quaternion.premultiply(dq);
  s.pivot.updateMatrixWorld(true);
  if(t>=1) finaliseSlice();
}

// ── State machine tick ────────────────────────────────────────
function tickState(dt){
  if(cubeState==='solved'){
    stateTimer-=dt;
    stateLabel.textContent='Solved ✓';
    if(stateTimer<=0){
      cubeState='scrambling';
      movesLeft=SCRAMBLE_MOVES;
      moveHistory=[];
      stateLabel.textContent='Scrambling…';
      sliceDelay=0;
    }
  } else if(cubeState==='scrambling'){
    stateLabel.textContent='Scrambling…';
    if(!sliceAnim){
      sliceDelay-=dt;
      if(sliceDelay<=0 && movesLeft>0){
        const m=pickMove();
        if(startSlice(m.def,m.layer,m.dir)){
          moveHistory.push(m);
          movesLeft--;
          sliceDelay=0.08;
        }
      }
      if(movesLeft===0 && !sliceAnim){
        cubeState='waiting';
        stateTimer=1.5;
      }
    }
  } else if(cubeState==='waiting'){
    stateTimer-=dt;
    stateLabel.textContent='Solving…';
    if(stateTimer<=0){
      cubeState='solving';
      movesLeft=moveHistory.length;
      sliceDelay=0;
    }
  } else if(cubeState==='solving'){
    stateLabel.textContent='Solving…';
    if(!sliceAnim){
      sliceDelay-=dt;
      if(sliceDelay<=0 && movesLeft>0){
        const m=moveHistory[moveHistory.length-movesLeft]; // reverse order
        // reverse: same layer, opposite dir
        if(startSlice(m.def, m.layer, -m.dir)){
          movesLeft--;
          sliceDelay=0.11;
        }
      }
      if(movesLeft===0 && !sliceAnim){
        cubeState='solved';
        stateTimer=3.0;
        stateLabel.textContent='Solved ✓';
      }
    }
  }
}

// ══════════════════════════════════════════════════════════════
// DRAG INTERACTION
// ══════════════════════════════════════════════════════════════
let rotX=0.42, rotY=0.55, velX=0, velY=0;
let dragging=false, hovering=false, lastMX=0, lastMY=0;

container.addEventListener('mouseenter',()=>hovering=true);
container.addEventListener('mouseleave',()=>{hovering=false;dragging=false;});
container.addEventListener('mousedown',e=>{dragging=true;velX=velY=0;lastMX=e.clientX;lastMY=e.clientY;});
window.addEventListener('mouseup',()=>dragging=false);
container.addEventListener('mousemove',e=>{
  if(!dragging) return;
  velY=(e.clientX-lastMX)*0.009; velX=(e.clientY-lastMY)*0.009;
  rotX+=velX; rotY+=velY; lastMX=e.clientX; lastMY=e.clientY;
});
container.addEventListener('touchstart',e=>{dragging=true;velX=velY=0;lastMX=e.touches[0].clientX;lastMY=e.touches[0].clientY;},{passive:true});
window.addEventListener('touchend',()=>dragging=false);
container.addEventListener('touchmove',e=>{
  e.preventDefault();
  const t=e.touches[0];
  velY=(t.clientX-lastMX)*0.011; velX=(t.clientY-lastMY)*0.011;
  rotX+=velX; rotY+=velY; lastMX=t.clientX; lastMY=t.clientY;
},{passive:false});

// ══════════════════════════════════════════════════════════════
// RENDER LOOP
// ══════════════════════════════════════════════════════════════
const clock=new THREE.Clock();
let started=false;

function startLoop(){
  started=true;
}

function animate(){
  requestAnimationFrame(animate);
  if(!started) return;
  const dt=Math.min(clock.getDelta(),0.05);
  const elapsed=clock.getElapsedTime();

  tickState(dt);
  updateSlice(dt);

  if(!dragging){
    velX*=0.91; velY*=0.91;
    rotX+=velX; rotY+=velY;
    if(!hovering){
      rotY+=0.003;
      rotX+=Math.sin(elapsed*0.22)*0.0004;
    }
  }
  cubeGroup.rotation.x=rotX;
  cubeGroup.rotation.y=rotY;
  cubeGroup.position.y=Math.sin(elapsed*0.6)*0.08;
  renderer.render(scene,camera);
}
animate();

window.addEventListener('resize',()=>{
  W=window.innerWidth; H=window.innerHeight;
  camera.aspect=W/H; camera.updateProjectionMatrix();
  renderer.setSize(W,H);
});
</script>
